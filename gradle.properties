group=io.github.Earth1283
version=1.0

# ---------- Gradle daemon ----------
org.gradle.daemon=true
# Keep daemon alive for 3 hours (codespace sessions are long-lived)
org.gradle.daemon.idletimeout=10800000

# ---------- JVM args for the Gradle daemon ----------
# ZGC (generational mode, Java 21+) minimises GC pauses on incremental builds
org.gradle.jvmargs=-Xms256m -Xmx2g \
  -XX:+UseZGC -XX:+ZGenerational \
  -XX:+HeapDumpOnOutOfMemoryError \
  -Dfile.encoding=UTF-8

# ---------- Parallelism ----------
org.gradle.parallel=true
# Cap workers at 4 (codespace CPUs); remove to let Gradle auto-detect
org.gradle.workers.max=4

# ---------- Caching ----------
org.gradle.caching=true
org.gradle.configuration-cache=true
# Watch the filesystem so incremental builds skip unchanged inputs immediately
org.gradle.vfs.watch=true

# ---------- Kotlin compiler ----------
kotlin.incremental=true
# Snapshot-based IC avoids recompiling when only private ABI changes
kotlin.incremental.useClasspathSnapshot=true
kotlin.caching.enabled=true
# Reuse the Kotlin daemon across Gradle daemons
kotlin.daemon.jvm.options=-Xms128m -Xmx1g -XX:+UseZGC -XX:+ZGenerational
